services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexmarkets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nexmarkets-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexmarkets"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - nexmarkets-redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexmarkets
      MINIO_ROOT_PASSWORD: nexmarkets-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nexmarkets-minio:/data

volumes:
  nexmarkets-postgres:
  nexmarkets-redis:
  nexmarkets-minio:
